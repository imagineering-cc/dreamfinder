# Docker Compose for Dreamfinder (Dart) + signal-cli-rest-api
#
# Usage:
#   docker compose -f docker-compose.dart.yml up -d
#   docker compose -f docker-compose.dart.yml logs -f bot
#
# First-time setup:
#   1. Start signal-api: docker compose -f docker-compose.dart.yml up -d signal-api
#   2. Link device: curl -X POST 'http://localhost:8080/v1/qrcodelink?device_name=dreamfinder'
#   3. Scan QR code with Signal on your phone
#   4. Set SIGNAL_PHONE_NUMBER in .env
#   5. Start bot: docker compose -f docker-compose.dart.yml up -d

services:
  signal-api:
    image: bbernhard/signal-cli-rest-api:latest
    ports:
      - "8080:8080"
    volumes:
      - signal-data:/home/.local/share/signal-cli
    environment:
      - MODE=normal
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - signal-api
    env_file:
      - .env
    environment:
      - SIGNAL_API_URL=http://signal-api:8080
    ports:
      - "8081:8081"
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  signal-data:
  bot-data:
